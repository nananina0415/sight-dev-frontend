services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sight-frontend
    ports:
      - "3000:80"
    environment:
      # 필요 시 .env.production 파일로 관리
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8080}
      - VITE_API_V2_BASE_URL=${VITE_API_V2_BASE_URL:-http://localhost:8080}
    restart: unless-stopped
    networks:
      - sight-network

networks:
  sight-network:
    driver: bridge
